name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate output
        run: |
          test -d dist
          test -f dist/index.html

      - name: Validate forbidden files
        run: |
          if find . \( -name ".env" -o -name "*.pem" -o -name "*.key" \) -not -path "./.git/*" -print -quit | grep -q .; then
            echo "Forbidden file found"
            exit 1
          fi
